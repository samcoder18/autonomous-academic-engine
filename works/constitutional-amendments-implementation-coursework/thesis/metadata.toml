[abstract]
ru = "Курсовая работа посвящена теоретико-правовому анализу проблем реализации конституционных поправок на примере изменений Конституции Российской Федерации 2020 года. Рассматриваются назначение и пределы конституционных изменений, особенности процедуры принятия поправок, развитие законодательства о публичной власти, Правительстве, Государственном Совете, субъектах Российской Федерации и местном самоуправлении. Особое внимание уделяется правовой определенности, разделению властей, федерализму, социальным гарантиям и критериям эффективности реализации конституционных норм."
en = "The course paper examines the theoretical and legal problems of implementing constitutional amendments, using the 2020 amendments to the Constitution of the Russian Federation as its principal case. It considers the purposes and limits of constitutional change, the adoption procedure, and the development of legislation on public authority, the Government, the State Council, constituent entities and local self-government. Particular attention is paid to legal certainty, separation of powers, federalism, social guarantees and criteria for effective constitutional implementation."

