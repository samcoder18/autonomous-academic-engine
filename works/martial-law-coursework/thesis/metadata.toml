[abstract]
ru = "Курсовая работа посвящена военному положению как особому государственно-правовому режиму. Рассматриваются его понятие и признаки, отличие от чрезвычайного положения, конституционные основания введения, полномочия Президента Российской Федерации и Совета Федерации, содержание указа, меры и временные ограничения, гарантии законности, а также практика применения соответствующего законодательства в 2022 году."
en = "The course paper examines martial law as a special state and legal regime. It considers its concept and features, its distinction from a state of emergency, the constitutional grounds and procedure for introduction, the powers of the President of the Russian Federation and the Federation Council, the contents of the presidential decree, temporary measures and restrictions, legal safeguards, and the application of the relevant legislation in 2022."

