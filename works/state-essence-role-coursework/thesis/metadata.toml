[abstract]
ru = "Курсовая работа посвящена юридико-теоретическому анализу сущности государства и его роли в обществе. В работе рассматриваются основные подходы к пониманию государства, признаки государственности, значение публичной власти, суверенитета и права, а также функции современного государства на примере Российской Федерации. Особое внимание уделяется связи государства с правопорядком, правами человека, социальными обязанностями публичной власти и конституционными пределами государственного вмешательства."
en = "The course paper provides a legal-theoretical analysis of the essence of the state and its role in society. It examines key approaches to the concept of the state, the legal significance of state attributes, public authority, sovereignty and law, as well as the functions of the modern state using the Russian Federation as the main example. Special attention is paid to the relationship between the state, legal order, human rights, social obligations of public power and constitutional limits of state intervention."

